apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: library-gateway
  namespace: default
spec:
  selector:
    istio: ingressgateway # use istio default controller
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: library-vs
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - library-gateway
  http:
  - match:
    - uri:
        prefix: /api/book
    - uri:
        prefix: /api/author
    - uri:
        prefix: /api/genre
    - uri:
        prefix: /api/publisher
    route:
    - destination:
        host: book-service
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/order
    - uri:
        prefix: /api/address
    route:
    - destination:
        host: order-service
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/inventory
    route:
    - destination:
        host: inventory-service
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/email
    route:
    - destination:
        host: email-service
        port:
          number: 8080
